name: CI / CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:

env:
  IMAGE_NAME: uptime-monitor
  REGISTRY: ghcr.io
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - run: pip install -r requirements.txt
      - run: pip install flake8 black mypy

      - run: flake8 src
      - run: black --check src
      - run: mypy src

  semgrep:
    name: Semgrep Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: semgrep/semgrep-action@v1
        with:
          config: auto
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [lint, semgrep]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: pip install -r requirements.txt
      - run: pip install pytest

      - run: pytest

  build-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: unit-tests

    env:
      IMAGE_NAME: uptime-monitor

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t $IMAGE_NAME:ci .

      - name: Save image to tar
        run: docker save $IMAGE_NAME:ci -o image.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar

  image-tests:
    name: Image Tests
    runs-on: ubuntu-latest
    needs: build-image

    steps:
      - uses: actions/checkout@v4

      - run: docker compose up -d --build

      - name: Wait for API
        run: |
          for i in {1..20}; do
            curl -f http://localhost:8000/status && break
            sleep 2
          done

      - run: docker compose down


  orca:
    name: Orca Security Scan
    runs-on: ubuntu-latest
    needs: build-image

    steps:
      - uses: actions/checkout@v4

      - name: Orca scan
        run: |
          echo "Orca scan"

  push-image:
    name: Push Docker Image to GHCR
    runs-on: ubuntu-latest
    needs: [image-tests, orca]

    permissions:
      contents: read
      packages: write

    env:
      IMAGE_NAME: uptime-monitor

    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load image
        run: docker load -i image.tar

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag image
        run: |
          IMAGE=ghcr.io/${{ github.repository }}/$IMAGE_NAME
          docker tag $IMAGE_NAME:ci $IMAGE:latest
          docker tag $IMAGE_NAME:ci $IMAGE:${{ github.sha }}

      - name: Push image
        run: |
          IMAGE=ghcr.io/${{ github.repository }}/$IMAGE_NAME
          docker push $IMAGE:latest
          docker push $IMAGE:${{ github.sha }}


  deploy-dev:
    name: Deploy to Dev / Stage
    runs-on: ubuntu-latest
    needs: push-image
    # Manual gate — create a "dev" environment in repo Settings → Environments
    # and add yourself as a required reviewer to control when this runs
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Download existing Terraform state (if any)
        uses: actions/download-artifact@v4
        with:
          name: terraform-state
          path: infra
        continue-on-error: true  # no artifact on first run — that's fine

      - name: Terraform Init
        working-directory: infra
        run: terraform init

      - name: Terraform Apply
        working-directory: infra
        run: terraform apply -auto-approve -var="image_tag=${{ github.sha }}"

      - name: Save Terraform state
        uses: actions/upload-artifact@v4
        with:
          name: terraform-state
          path: infra/terraform.tfstate
          overwrite: true

      - name: Print app URL
        working-directory: infra
        run: terraform output app_url

  smoke-tests:
    name: Smoke / E2E Tests
    runs-on: ubuntu-latest
    needs: deploy-dev

    steps:
      - run: echo "Run smoke tests against DEV/STAGE"

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: smoke-tests
    environment:
      name: production

    steps:
      - run: echo "Deploying to production 🚀"

